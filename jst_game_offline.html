  .overlay-title { font-family:'Press Start 2P'; color:#f5c842; font-size:28px; margin-bottom:16px; text-shadow:0 0 20px #f5c84288; letter-spacing:2px; }
  .overlay-sub { font-family:'VT323'; color:#ccc; font-size:22px; margin-bottom:30px; text-align:center; max-width:560px; line-height:1.5; }
  .big-btn { font-family:'Press Start 2P'; font-size:13px; background:#f5c842; color:#1a0a2e; border:none; padding:14px 28px; cursor:pointer; margin:6px; transition:transform 0.1s; }
  .big-btn:hover { transform:scale(1.05); background:#ffe066; }
  .char-select { display:flex; gap:14px; margin:10px 0 20px; }
  .char-btn { font-family:'Press Start 2P'; font-size:9px; padding:10px 14px; background:#2a1a4e; color:#f5c842; border:2px solid #f5c84255; cursor:pointer; transition:all 0.15s; }
  .char-btn:hover, .char-btn.selected { background:#f5c842; color:#1a0a2e; border-color:#f5c842; }
  .team-row { display:flex; align-items:center; gap:10px; margin:8px 0; }
  .team-label { font-family:'Press Start 2P'; font-size:9px; width:80px; }
  #teamALabel { color:#4fc3f7; }
  #teamBLabel { color:#ff7043; }
  .slot-label { font-family:'VT323'; font-size:18px; color:#aaa; }
  #cardOverlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,0,20,0.92); z-index:9; display:none; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
  .card-pick-title { font-family:'Press Start 2P'; font-size:14px; color:#f5c842; }
  .cards-row { display:flex; gap:20px; }
  .card-choice { font-family:'Press Start 2P'; font-size:8px; background:#2a1a4e; border:2px solid #f5c84255; color:#fff; padding:16px 12px; width:160px; text-align:center; cursor:pointer; line-height:1.8; transition:all 0.15s; }
  .card-choice:hover { background:#f5c842; color:#1a0a2e; border-color:#f5c842; }
  .card-choice .card-name { font-size:10px; color:#f5c842; display:block; margin-bottom:8px; }
  .card-choice:hover .card-name { color:#1a0a2e; }
  #statusBar { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); font-family:'VT323'; font-size:18px; color:#aaa; pointer-events:none; }
  .effect-label { font-family:'VT323'; font-size:16px; }
  #pauseOverlay { position:absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(10,0,20,0.85); z-index:20; }

<body>
<div id="gameWrapper">
  <canvas id="c" width="800" height="520"></canvas>

  <!-- START OVERLAY -->
  <div id="overlay">
    <div class="overlay-title">JS&T</div>
    <div class="overlay-sub">A Stacking Brawler · Pick your teams!</div>

    <div class="team-row">
      <span class="team-label" id="teamALabel">TEAM A</span>
      <span class="slot-label">Top:</span>
      <div class="char-select" id="selectA1">
        <button class="char-btn selected" data-char="jimmy">JIMMY</button>
        <button class="char-btn" data-char="sam">SAM</button>

        <button class="char-btn" data-char="biwwy">BIWWY</button>
      </div>
      <span class="slot-label">Bottom:</span>
      <div class="char-select" id="selectA2">
        <button class="char-btn" data-char="jimmy">JIMMY</button>
        <button class="char-btn selected" data-char="sam">SAM</button>
        <button class="char-btn" data-char="tommy">TOMMY</button>
        <button class="char-btn" data-char="biwwy">BIWWY</button>
      </div>
    </div>

    <div class="team-row">
      <span class="team-label" id="teamBLabel">TEAM B</span>
      <span class="slot-label">Top:</span>
      <div class="char-select" id="selectB1">
        <button class="char-btn" data-char="jimmy">JIMMY</button>
        <button class="char-btn" data-char="sam">SAM</button>
        <button class="char-btn selected" data-char="tommy">TOMMY</button>
        <button class="char-btn" data-char="biwwy">BIWWY</button>
      </div>
      <span class="slot-label">Bottom:</span>
      <div class="char-select" id="selectB2">
        <button class="char-btn" data-char="jimmy">JIMMY</button>
        <button class="char-btn" data-char="sam">SAM</button>
        <button class="char-btn" data-char="tommy">TOMMY</button>
        <button class="char-btn selected" data-char="biwwy">BIWWY</button>
      </div>
    </div>

    <div style="margin-top:10px; font-family:VT323; font-size:16px; color:#888; text-align:center; max-width:580px; line-height:1.6;">
      P1: WASD move · LShift upper · LCtrl lower · LAlt card · LCtrl+LShift switch<br>
      P2: Numpad 4/6/8/5 move · Num7 upper · Num9 lower · Num3 card · NumEnter switch<br>
      ESC = pause
    </div>

  </div>

  <!-- PAUSE OVERLAY -->
  <div id="pauseOverlay">

    <button class="pause-btn" id="resumeBtn">▶ RESUME</button>

  </div>

  <div id="statusBar"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 520;

// ─── CARD DEFINITIONS ───────────────────────────────────────────────
const CARDS = {
  banana:   { name:'🍌 BANANA',   desc:'Varies by character!\nJimmy: allergic\nSam: dirty hat\nTommy top: +1pt\nTommy bot: sticky 10s\nBiwwy: immune' },
  bowtie:   { name:'🎀 BOW TIE',  desc:'Sam: double power!\nOthers: cancel Sam\nAll: 3-hit shield' },
  mustard:  { name:'💙 BLUE MUSTARD', desc:'Blinds hit character\n10 seconds\nDisables their power' },
  megafrog: { name:'🐸 MEGA FROG', desc:'2x jump for all!\nTommy bot = 4x!' },
  sloopgun: { name:'🥔 SLOOP GUN', desc:'Potato launcher!\nHit = 1 point\nAll normal defenses apply' },
};
const CARD_KEYS = Object.keys(CARDS);

// ─── CHARACTER COLORS / SVG ──────────────────────────────────────────
const CHAR_COLORS = {
  jimmy: { body:'#e8a87c', shirt:'#e63946', hair:'#5c3317', hat:null },
  sam:   { body:'#f0d9b5', shirt:'#1d3557', hair:'#2c1810', hat:'#2c2c2c' },
  tommy: { body:'#ffd6aa', shirt:'#06d6a0', hair:'#c97d4e', hat:null },
  biwwy: { body:'#ffb347', shirt:'#9b59b6', hair:'#8b4513', hat:null },
};

// ─── GAME STATE ──────────────────────────────────────────────────────
let game = null;
let keys = {};
let gamepadState = { buttons:{}, axes:{} };
let prevKeys = {};
let prevGamepad = { buttons:{} };

// ─── PHYSICS CONSTANTS ───────────────────────────────────────────────
const GRAVITY = 0.55;
const GROUND_Y = H - 60;

// ─── PLATFORMS (Hoomer Mansion) ──────────────────────────────────────
const PLATFORMS = [
  { x:0,   y:GROUND_Y, w:W,   h:60,  label:'floor' },       // floor
  { x:80,  y:370,      w:200, h:18,  label:'couch' },        // couch
  { x:340, y:310,      w:120, h:14,  label:'fireplace' },    // fireplace mantle
  { x:560, y:350,      w:100, h:14,  label:'windowsill' },   // window sill
  { x:340, y:180,      w:80,  h:12,  label:'chandelier' },   // chandelier
];

// ─── TEAM / STACK SETUP ──────────────────────────────────────────────
function makeStack(topChar, botChar, startX, teamId) {
  return {
    teamId,
    chars: [topChar, botChar], // [0]=top, [1]=bottom
    x: startX,
    y: GROUND_Y,  // feet exactly on floor
    vx: 0,
    vy: 0,
    onGround: true,
    facingRight: teamId === 0,
    score: 0,
    roundScore: 0,

    // Status effects
    upperBlinded: 0,   // ms remaining
    lowerBlinded: 0,
    upperPowerDisabled: false, // banana allergy / dirty hat
    lowerPowerDisabled: false,
    stickyBoots: 0,    // ms
    topHatDirty: false,
    jimmyAllergic: false,
    bowTieWearer: null, // 'upper'|'lower'|null
    bowTieHits: 0,      // hits toward the 3-hit point
    megaFrogActive: false,
    megaFrogTimer: 0,

    // Biwwy stored item
    storedItem: null,

    // Sam deflect active
    samDeflecting: false,

    // Tommy adorable active
    tommyShielding: false,

    // Biwwy dodge active
    biwwyDodging: false,

    // Card
    card: null,
    cardCooldown: 0,  // ms

    // Attack projectiles fired by this stack
    projectiles: [],

    // Switch animation
    switching: false,
    switchTimer: 0,

    // Status text display
    statusTexts: [],
  };
}

// ─── DRAWING HELPERS ─────────────────────────────────────────────────
function drawCharSVG(ctx, name, x, y, w, h, flipped) {
  const c = CHAR_COLORS[name];
  ctx.save();
  if (flipped) { ctx.translate(x + w/2, y); ctx.scale(-1, 1); ctx.translate(-w/2, 0); } 
  else { ctx.translate(x, y); }

  // Body
  ctx.fillStyle = c.shirt;
  ctx.fillRect(w*0.2, h*0.35, w*0.6, h*0.45);

  // Head
  ctx.fillStyle = c.body;
  ctx.fillRect(w*0.2, h*0.05, w*0.6, h*0.32);

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(w*0.3, h*0.13, w*0.1, h*0.08);
  ctx.fillRect(w*0.58, h*0.13, w*0.1, h*0.08);

  // Smile
  ctx.fillRect(w*0.32, h*0.27, w*0.36, h*0.04);

  // Hair
  ctx.fillStyle = c.hair;
  ctx.fillRect(w*0.18, h*0.04, w*0.64, h*0.1);

  // Legs
  ctx.fillStyle = c.body;
  ctx.fillRect(w*0.22, h*0.78, w*0.22, h*0.2);
  ctx.fillRect(w*0.56, h*0.78, w*0.22, h*0.2);

  // Arms
  ctx.fillRect(w*0.04, h*0.36, w*0.18, h*0.1);
  ctx.fillRect(w*0.78, h*0.36, w*0.18, h*0.1);

  // Special features
  if (name === 'sam' && c.hat) {
    ctx.fillStyle = c.hat;
    ctx.fillRect(w*0.15, h*0.0, w*0.7, h*0.08); // brim
    ctx.fillRect(w*0.28, -h*0.18, w*0.44, h*0.2); // top
  }
  if (name === 'tommy') {
    // Frog sneakers
    ctx.fillStyle = '#06d6a0';
    ctx.fillRect(w*0.18, h*0.92, w*0.26, h*0.08);
    ctx.fillRect(w*0.54, h*0.92, w*0.26, h*0.08);
  }
  if (name === 'biwwy') {
    // Big nose
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(w*0.4, h*0.2, w*0.22, h*0.1);
  }
  if (name === 'jimmy') {
    // Freckles
    ctx.fillStyle = '#c97d4e';
    ctx.fillRect(w*0.28, h*0.2, 3, 3);
    ctx.fillRect(w*0.62, h*0.2, 3, 3);
  }

  ctx.restore();
}

function drawStack(st) {
  const sw = 38, sh = 36; // per character size in stack
  const bx = st.x - sw/2;
  const topY = st.y - sh*2;
  const botY = st.y - sh;

  // Bottom char
  drawCharSVG(ctx, st.chars[1], bx, botY, sw, sh, !st.facingRight);
  // Top char
  drawCharSVG(ctx, st.chars[0], bx, topY, sw, sh, !st.facingRight);

  // Name tags
  ctx.font = '7px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillStyle = TEAM_COLORS[st.teamId];
  ctx.fillText(st.chars[0].toUpperCase(), st.x, topY - 4);
  ctx.fillText(st.chars[1].toUpperCase(), st.x, botY - 2);

  // Power indicators
  if (st.samDeflecting) {
    ctx.fillStyle = '#f5c842aa';
    ctx.fillRect(bx - 4, topY - 8, sw + 8, sh + 8);
    ctx.strokeStyle = '#f5c842';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx - 4, topY - 8, sw + 8, sh + 8);
  }
  if (st.tommyShielding) {
    ctx.fillStyle = '#06d6a0aa';
    ctx.fillRect(bx - 4, topY - 8, sw + 8, sh + 8);
    ctx.strokeStyle = '#06d6a0';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx - 4, topY - 8, sw + 8, sh + 8);
  }
  if (st.biwwyDodging) {
    ctx.fillStyle = '#9b59b6aa';
    ctx.fillRect(bx - 4, botY - 4, sw + 8, sh + 8);
    ctx.strokeStyle = '#9b59b6';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx - 4, botY - 4, sw + 8, sh + 8);
  }

  // Bow tie indicator
  if (st.bowTieWearer) {
    ctx.fillStyle = '#ff69b4';
    ctx.font = '14px serif';
    ctx.textAlign = 'center';
    const bty = st.bowTieWearer === 'upper' ? topY + sh*0.35 : botY + sh*0.35;
    ctx.fillText('🎀', st.x, bty);
  }

  // Stored item indicator (Biwwy)
  if (st.storedItem) {
    ctx.font = '11px serif';
    ctx.fillText('📦', st.x + 22, topY);
  }

  // Status effects floating
  const now = Date.now();
  st.statusTexts = st.statusTexts.filter(s => now - s.born < 1200);
  st.statusTexts.forEach(s => {
    const age = now - s.born;
    const alpha = 1 - age/1200;
    ctx.globalAlpha = alpha;
    ctx.font = '11px "Press Start 2P"';
    ctx.fillStyle = s.color || '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(s.text, st.x + s.ox, topY - 10 - age*0.04);
    ctx.globalAlpha = 1;
  });

  // Blind overlay
  if (st.upperBlinded > 0) {
    ctx.fillStyle = 'rgba(0,0,200,0.3)';
    ctx.fillRect(bx - 2, topY - 2, sw + 4, sh + 4);
  }
  if (st.lowerBlinded > 0) {
    ctx.fillStyle = 'rgba(0,0,200,0.3)';
    ctx.fillRect(bx - 2, botY - 2, sw + 4, sh + 4);
  }
}

const TEAM_COLORS = ['#4fc3f7','#ff7043'];

// ─── PROJECTILE DRAWING ──────────────────────────────────────────────
const PROJ_EMOJIS = {
  balloon: '💧', banana: '🍌', bowtie: '🎀', mustard: '💙', potato: '🥔',
};

function drawProjectiles(stacks) {
  ctx.font = '16px serif';
  ctx.textAlign = 'center';
  stacks.forEach(st => {
    st.projectiles.forEach(p => {
      ctx.fillText(PROJ_EMOJIS[p.type] || '●', p.x, p.y);
    });
  });
}

// ─── STAGE DRAWING ───────────────────────────────────────────────────
function drawStage() {
  // Background — warm living room
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#3d1f0a');
  grad.addColorStop(1,'#1a0a02');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Wallpaper pattern
  ctx.fillStyle = 'rgba(180,100,30,0.07)';
  for(let i=0;i<W;i+=40) for(let j=0;j<H;j+=40) ctx.fillRect(i,j,18,18);

  // Platforms
  PLATFORMS.forEach(p => {
    if (p.label === 'floor') {
      ctx.fillStyle = '#5c3317';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#7a4a22';
      for(let i=0;i<W;i+=60) { ctx.fillRect(i, p.y, 55, 8); }
    } else if (p.label === 'couch') {
      ctx.fillStyle = '#8b2500';
      ctx.fillRect(p.x, p.y, p.w, p.h + 30);
      ctx.fillStyle = '#a03010';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#c04020';
      ctx.fillRect(p.x+4, p.y+2, p.w-8, 6);
    } else if (p.label === 'fireplace') {
      ctx.fillStyle = '#444';
      ctx.fillRect(p.x, p.y, p.w, p.h + 40);
      ctx.fillStyle = '#666';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // fire
      ctx.fillStyle = '#ff6600aa';
      ctx.fillRect(p.x+20, p.y+8, 80, 30);
      ctx.fillStyle = '#ffcc00aa';
      ctx.fillRect(p.x+35, p.y+14, 50, 20);
    } else if (p.label === 'windowsill') {
      ctx.fillStyle = '#8b6914';
      ctx.fillRect(p.x, p.y, p.w, p.h + 20);
      ctx.fillStyle = '#a07820';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // window glass
      ctx.fillStyle = 'rgba(180,220,255,0.15)';
      ctx.fillRect(p.x+5, p.y - 80, p.w-10, 78);
      ctx.strokeStyle = '#8b6914';
      ctx.lineWidth = 3;
      ctx.strokeRect(p.x+5, p.y-80, p.w-10, 78);
    } else if (p.label === 'chandelier') {
      ctx.fillStyle = '#b8860b';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // chain up
      ctx.strokeStyle = '#b8860b';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(p.x+p.w/2, p.y); ctx.lineTo(p.x+p.w/2, 0); ctx.stroke();
      // candles
      for(let i=0;i<4;i++) {
        ctx.fillStyle = '#ffe066';
        ctx.fillRect(p.x+8+i*18, p.y-8, 6, 10);
        ctx.fillStyle = 'rgba(255,200,50,0.4)';
        ctx.beginPath(); ctx.arc(p.x+11+i*18, p.y-8, 10, 0, Math.PI*2); ctx.fill();
      }
    }
  });
}

// ─── HUD ─────────────────────────────────────────────────────────────

  ctx.textAlign = 'right';
  ctx.fillStyle = TEAM_COLORS[1];

  ctx.fillStyle = '#fff';
  ctx.font = '16px "Press Start 2P"';
  ctx.fillText(`${g.stacks[1].score} pts`, W-10, 42);

      ctx.fillStyle = st.cardCooldown > 0 ? '#888' : '#f5c842';

// ─── COLLISION / PLATFORM ────────────────────────────────────────────
function getStackBottom(st) { return st.y; }
function getStackTop(st) { return st.y - 72; }
function getStackLeft(st) { return st.x - 19; }
function getStackRight(st) { return st.x + 19; }

function landOnPlatform(st) {
  // Called AFTER position updated by velocity.
  st.onGround = false;

  const sl = st.x - 14;
  const sr = st.x + 14;
  const bottom = st.y;
  const prevBottom = bottom - st.vy;

  for (const p of PLATFORMS) {
    if (sr <= p.x || sl >= p.x + p.w) continue;

    // Crossing platform surface from above this frame
    if (prevBottom <= p.y + 1 && bottom >= p.y && st.vy >= 0) {
      st.y = p.y;
      st.vy = 0;
      st.onGround = true;
      return;
    }

    // Already resting on surface (handles staying still)
    if (bottom >= p.y && bottom <= p.y + 4 && st.vy >= 0) {
      st.y = p.y;
      st.vy = 0;
      st.onGround = true;
      return;
    }
  }

  if (st.x < 20)   { st.x = 20;   st.vx = 0; }
  if (st.x > W-20) { st.x = W-20; st.vx = 0; }
  if (st.y > H + 60) { st.y = GROUND_Y; st.vy = 0; st.x = st.teamId === 0 ? 200 : 600; }
}

// ─── ATTACK LOGIC ────────────────────────────────────────────────────
function fireProjectile(st, type, fromPosition) {
  // fromPosition: 'upper' or 'lower'
  const py = fromPosition === 'upper' ? st.y - 64 : st.y - 36;
  const vx = st.facingRight ? 7 : -7;
  st.projectiles.push({ type, x: st.x, y: py, vx, vy: -1, owner: st.teamId, fromPos: fromPosition, fromStack: st });
}

function applyHit(target, proj, g) {
  const type = proj.type;
  const hitPos = proj.hitPos || 'upper'; // which stack position was hit

  // Check Tommy adorable face shield (upper)
  if (hitPos === 'upper' && target.chars[0] === 'tommy' && target.tommyShielding) {
    addStatus(target, 'BLOCKED!', '#06d6a0');
    return false;
  }

  // Check Sam hat deflect (upper)
  if (hitPos === 'upper' && target.chars[0] === 'sam' && target.samDeflecting) {
    const bounced = { ...proj, vx: -proj.vx, owner: target.teamId, fromStack: target };
    // Sam gets point on successful return
    g.stacks[target.teamId].score += target.bowTieWearer === 'upper' ? 2 : 1;
    g.stacks[target.teamId].roundScore += target.bowTieWearer === 'upper' ? 2 : 1;
    addStatus(target, target.bowTieWearer === 'upper' ? '+2 DEFLECT!' : '+1 DEFLECT!', '#f5c842');
    // Re-fire bounced projectile
    const src = g.stacks[1 - target.teamId];
    src.projectiles.push(bounced);
    return false;
  }

  // Check Biwwy dodge (lower)
  if (hitPos === 'lower' && target.chars[1] === 'biwwy' && target.biwwyDodging) {
    addStatus(target, 'DODGED!', '#9b59b6');
    return false;
  }

  // Bow tie 3-hit shield
  if (target.bowTieWearer) {
    target.bowTieHits++;
    if (target.bowTieHits < 3) {
      addStatus(target, `HIT ${target.bowTieHits}/3`, '#ff69b4');
      return false;
    } else {
      target.bowTieHits = 0;
    }
  }

  // Apply type-specific effects
  if (type === 'balloon') {
    scoreHit(g, proj.owner, target, 1);
  } else if (type === 'potato') {
    scoreHit(g, proj.owner, target, 1);
  } else if (type === 'banana') {
    applyBanana(target, hitPos, g, proj.owner);
  } else if (type === 'mustard') {
    applyMustard(target, hitPos);
    scoreHit(g, proj.owner, target, 0);
  } else if (type === 'bowtie') {
    applyBowTie(target, hitPos, g);
  } else if (type === 'kick') {
    scoreHit(g, proj.owner, target, 1);
  }
  return true;
}

function applyBanana(target, hitPos, g, ownerId) {
  const char = hitPos === 'upper' ? target.chars[0] : target.chars[1];
  if (char === 'biwwy') { addStatus(target, 'IMMUNE!', '#ffb347'); return; }
  if (char === 'jimmy') {
    target.jimmyAllergic = true;
    target.upperPowerDisabled = hitPos === 'upper';
    addStatus(target, 'ALLERGIC!', '#e63946');
    setTimeout(() => { target.jimmyAllergic = false; target.upperPowerDisabled = false; }, 8000);
  } else if (char === 'sam') {
    target.topHatDirty = true;
    target.upperPowerDisabled = hitPos === 'upper';
    addStatus(target, 'DIRTY HAT!', '#888');
    setTimeout(() => { target.topHatDirty = false; target.upperPowerDisabled = false; }, 8000);
  } else if (char === 'tommy') {
    if (hitPos === 'upper') {
      scoreHit(g, ownerId === 0 ? 1 : 0, g.stacks[ownerId === 0 ? 1 : 0], 1);
      addStatus(target, 'DELICIOUS! +1', '#06d6a0');
    } else {
      target.stickyBoots = 10000;
      addStatus(target, 'STICKY BOOTS!', '#c97d4e');
    }
  }
}

function applyMustard(target, hitPos) {
  addStatus(target, 'BLINDED! 10s', '#4fc3f7');
  if (hitPos === 'upper') {
    target.upperBlinded = 10000;
  } else {
    target.lowerBlinded = 10000;
  }
}

function applyBowTie(target, hitPos, g) {
  const char = hitPos === 'upper' ? target.chars[0] : target.chars[1];
  if (char === 'sam') {
    target.bowTieWearer = hitPos;
    addStatus(target, 'DOUBLE CLASS!', '#f5c842');
  } else {
    // Cancels Sam's class if Sam is on team
    const samTeam = g.stacks[target.teamId];
    if (samTeam.bowTieWearer) {
      samTeam.bowTieWearer = null;
      addStatus(target, 'SAM CANCELLED', '#888');
    }
    target.bowTieWearer = hitPos;
    addStatus(target, 'SHIELDED!', '#ff69b4');
  }
}

function scoreHit(g, teamId, target, pts) {
  if (pts > 0) {
    g.stacks[teamId].score += pts;
    g.stacks[teamId].roundScore += pts;
    addStatus(g.stacks[teamId], `+${pts}!`, '#f5c842');
    addStatus(target, 'HIT!', '#ff4444');
  }
}

function addStatus(st, text, color) {
  st.statusTexts.push({ text, color, born: Date.now(), ox: (Math.random()-0.5)*20 });
}

// ─── INPUT ───────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Escape') {
    if (g && g.state === 'playing') {
      g.state = 'paused';
      document.getElementById('pauseOverlay').style.display = 'flex';
    } else if (g && g.state === 'paused') {
      resumeGame();
    }
    return; // don't preventDefault for ESC so browser stays happy
  }
  keys[e.code] = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function keyPressed(code) { return keys[code] && !prevKeys[code]; }

function readGamepad() {
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  const gp = gps[0];
  if (!gp) return;
  gamepadState.buttons = {};
  gp.buttons.forEach((b, i) => { gamepadState.buttons[i] = b.pressed; });
  gamepadState.axes = gp.axes;
}

// ─── MAIN GAME LOOP ──────────────────────────────────────────────────
function createGame(teamA, teamB) {
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
  return {
    stacks: [
      makeStack(teamA[0], teamA[1], 200, 0),
      makeStack(teamB[0], teamB[1], 600, 1),
    ],
    teamNames: [
      `${cap(teamA[0])} & ${cap(teamA[1])}`,
      `${cap(teamB[0])} & ${cap(teamB[1])}`,
    ],
    round: 1,
    roundTimer: 0,
    roundDuration: 180000, // 3 min
    state: 'playing', // playing | roundEnd | cardPick | gameOver | paused
    cardPickQueue: [], // [{teamId, slotIdx}]
    lastTime: null,
  };
}

let g = null;

function update(dt) {
  if (!g || g.state !== 'playing') return;

  g.roundTimer += dt;
  if (g.roundTimer >= g.roundDuration) {
    endRound();
    return;
  }

  g.stacks.forEach((st, si) => {
    // Timers
    if (st.upperBlinded > 0) st.upperBlinded = Math.max(0, st.upperBlinded - dt);
    if (st.lowerBlinded > 0) st.lowerBlinded = Math.max(0, st.lowerBlinded - dt);
    if (st.stickyBoots > 0)  st.stickyBoots  = Math.max(0, st.stickyBoots  - dt);
    if (st.cardCooldown > 0) st.cardCooldown  = Math.max(0, st.cardCooldown - dt);

    // Controls
    const isP1 = si === 0;
    const left  = isP1 ? keys['KeyA']      : keys['Numpad4'];
    const right = isP1 ? keys['KeyD']      : keys['Numpad6'];
    const jump  = isP1 ? keyPressed('KeyW'): keyPressed('Numpad8');
    const down  = isP1 ? keys['KeyS']      : keys['Numpad5'];
    const upperPow = isP1 ? keyPressed('ShiftLeft')   : keyPressed('Numpad7');
    const lowerPow = isP1 ? keyPressed('ControlLeft') : keyPressed('Numpad9');
    const cardUse  = isP1 ? keyPressed('AltLeft')     : keyPressed('Numpad3');
    const switchK  = isP1
      ? (keyPressed('ShiftLeft') && keys['ControlLeft']) || (keys['ShiftLeft'] && keyPressed('ControlLeft'))
      : keyPressed('NumpadEnter');

    // Also support gamepad for P2 as fallback
    const gpLeft  = gamepadState.axes[0] < -0.5 || gamepadState.buttons[14];
    const gpRight = gamepadState.axes[0] > 0.5  || gamepadState.buttons[15];
    const gpJump  = gamepadState.buttons[0] && !prevGamepad.buttons[0];
    const gpDown  = gamepadState.buttons[13];
    const gpUpper = gamepadState.buttons[3] && !prevGamepad.buttons[3];
    const gpLower = gamepadState.buttons[2] && !prevGamepad.buttons[2];
    const gpCard  = gamepadState.buttons[5] && !prevGamepad.buttons[5];
    const gpSwitch= gamepadState.buttons[4] && !prevGamepad.buttons[4];

    const leftF  = isP1 ? left  : (left  || gpLeft);
    const rightF = isP1 ? right : (right || gpRight);
    const jumpF  = isP1 ? jump  : (jump  || gpJump);
    const downF  = isP1 ? down  : (down  || gpDown);
    const upperF = isP1 ? upperPow : (upperPow || gpUpper);
    const lowerF = isP1 ? lowerPow : (lowerPow || gpLower);
    const cardF  = isP1 ? cardUse  : (cardUse  || gpCard);
    const switchF= isP1 ? switchK  : (switchK  || gpSwitch);

    // Movement
    const speed = 3.5 * (st.chars[0] === 'jimmy' || st.chars[1] === 'jimmy' ? 1 : 1);
    const jimmyBot = st.chars[1] === 'jimmy';
    const moveSpeed = jimmyBot ? speed * 1.5 : speed;

    if (leftF)  { st.vx = -moveSpeed; st.facingRight = false; }
    else if (rightF) { st.vx = moveSpeed; st.facingRight = true; }
    else st.vx *= 0.75;

    // Jump
    const baseJump = -11;
    const tommyBot = st.chars[1] === 'tommy' && st.stickyBoots <= 0;
    const mega = st.megaFrogActive;
    let jumpPow = baseJump;
    if (tommyBot) jumpPow *= 2;
    if (mega) jumpPow *= 2;

    if (jumpF && st.onGround) {
      st.vy = jumpPow;
      st.onGround = false;
    }

    // Crouch / dodge activate
    st.biwwyDodging = downF && st.chars[1] === 'biwwy' && st.lowerBlinded <= 0;

    // Switch
    if (switchF && !st.switching) {
      st.switching = true;
      st.switchTimer = 200;
      addStatus(st, 'SWITCH!', '#fff');
    }
    if (st.switching) {
      st.switchTimer -= dt;
      if (st.switchTimer <= 0) {
        st.chars = [st.chars[1], st.chars[0]];
        // Also swap blind/disable states
        [st.upperBlinded, st.lowerBlinded] = [st.lowerBlinded, st.upperBlinded];
        st.switching = false;
        addStatus(st, 'SWAPPED!', '#4fc3f7');
      }
    }

    // Upper power
    if (upperF && !st.switching && st.upperBlinded <= 0) {
      const topChar = st.chars[0];
      if (topChar === 'jimmy' && !st.jimmyAllergic) {
        fireProjectile(st, 'balloon', 'upper');
      } else if (topChar === 'sam' && !st.topHatDirty) {
        st.samDeflecting = !st.samDeflecting;
        addStatus(st, st.samDeflecting ? 'HAT UP!' : 'HAT DOWN', '#f5c842');
      } else if (topChar === 'tommy') {
        st.tommyShielding = !st.tommyShielding;
        addStatus(st, st.tommyShielding ? 'CUTE SHIELD!' : 'SHIELD OFF', '#06d6a0');
      } else if (topChar === 'biwwy') {
        if (st.storedItem) {
          fireProjectile(st, st.storedItem, 'upper');
          addStatus(st, 'THROWN!', '#ffb347');
          st.storedItem = null;
        } else {
          addStatus(st, 'SNIFFING...', '#ffb347');
        }
      }
    }

    // Lower power
    if (lowerF && !st.switching && st.lowerBlinded <= 0) {
      const botChar = st.chars[1];
      if (botChar === 'sam') {
        const pts = st.bowTieWearer === 'lower' ? 2 : 1;
        fireProjectile(st, 'kick', 'lower');
        addStatus(st, 'KICK!', '#1d3557');
      } else if (botChar === 'tommy' && st.stickyBoots <= 0) {
        // Extra jump handled above via jumpPow, trigger visual
        addStatus(st, 'FROG JUMP!', '#06d6a0');
      }
    }

    // Card use
    if (cardF && st.card && st.cardCooldown <= 0) {
      useCard(st, g);
      st.cardCooldown = 5000;
    }

    // Physics
    if (!st.onGround) {
      st.vy += GRAVITY;
    } else {
      st.vy = 0;
    }
    st.x += st.vx;
    st.y += st.vy;
    landOnPlatform(st);

    // Update projectiles
    st.projectiles = st.projectiles.filter(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.2;
      if (p.x < 0 || p.x > W || p.y > H) return false;

      // Check Biwwy sniffer (upper) — absorb incoming
      const selfStack = g.stacks[p.owner];
      g.stacks.forEach(target => {
        if (target.teamId === p.owner) return; // don't hit self
        const tx = target.x, ty = target.y;
        const inRange = Math.abs(p.x - tx) < 28 && p.y > ty - 75 && p.y < ty;

        if (!inRange) return;
        // Determine hit position
        const hitPos = p.y < ty - 36 ? 'upper' : 'lower';
        p.hitPos = hitPos;

        // Biwwy sniff (upper)
        if (target.chars[0] === 'biwwy' && hitPos === 'upper' && !target.storedItem && target.upperBlinded <= 0) {
          target.storedItem = p.type;
          addStatus(target, 'SNIFFED!', '#ffb347');
          p._remove = true;
          return;
        }

        applyHit(target, p, g);
        p._remove = true;
      });
      return !p._remove;
    });
  });
}

function useCard(st, g) {
  if (!st.card) return;
  const target = g.stacks[1 - st.teamId];
  if (st.card === 'banana') {
    fireProjectile(st, 'banana', 'upper');
  } else if (st.card === 'mustard') {
    fireProjectile(st, 'mustard', 'upper');
  } else if (st.card === 'bowtie') {
    fireProjectile(st, 'bowtie', 'upper');
  } else if (st.card === 'sloopgun') {
    fireProjectile(st, 'potato', 'upper');
    fireProjectile(st, 'potato', 'lower');
  } else if (st.card === 'megafrog') {
    st.megaFrogActive = true;
    st.megaFrogTimer = 8000;
    addStatus(st, 'MEGA FROG!', '#06d6a0');
    setTimeout(() => { st.megaFrogActive = false; }, 8000);
  }
  addStatus(st, `CARD: ${st.card.toUpperCase()}!`, '#f5c842');
}

// ─── ROUND MANAGEMENT ────────────────────────────────────────────────
function endRound() {
  g.state = 'roundEnd';

  // Determine round winner for card pick order
  const r0 = g.stacks[0].roundScore;
  const r1 = g.stacks[1].roundScore;
  let firstPick = r0 > r1 ? 0 : r1 > r0 ? 1 : Math.random() < 0.5 ? 0 : 1;

  // Reset round scores
  g.stacks[0].roundScore = 0;
  g.stacks[1].roundScore = 0;

  if (g.round >= 3) {
    g.state = 'gameOver';
    showGameOver();
    return;
  }

  // Queue card picks: winner picks first for both their slots, then loser
  g.cardPickQueue = [
    { teamId: firstPick,   slotIdx: 0 },
    { teamId: 1-firstPick, slotIdx: 0 },
  ];
  g.round++;
  g.roundTimer = 0;
  startNextCardPick();
}

function startNextCardPick() {
  if (g.cardPickQueue.length === 0) {
    showCharSelect();
    return;
  }
  const pick = g.cardPickQueue[0];
  showCardPick(pick.teamId);
}

function showCardPick(teamId) {
  const cards = getTwoRandomCards();
  const overlay = document.getElementById('cardOverlay');
  document.getElementById('cardPickTitle').textContent = `${g.teamNames[teamId]} — PICK A CARD`;
  document.getElementById('cardPickTitle').style.color = TEAM_COLORS[teamId];

  const row = document.getElementById('cardsRow');
  row.innerHTML = '';
  cards.forEach(key => {
    const card = CARDS[key];
    const btn = document.createElement('div');
    btn.className = 'card-choice';
    btn.innerHTML = `<span class="card-name">${card.name}</span>${card.desc.replace(/\n/g,'<br>')}`;
    btn.onclick = () => {
      g.stacks[teamId].card = key;
      overlay.style.display = 'none';
      g.cardPickQueue.shift();
      startNextCardPick();
    };
    row.appendChild(btn);
  });
  overlay.style.display = 'flex';
  g.state = 'cardPick';
}

function getTwoRandomCards() {
  const shuffled = [...CARD_KEYS].sort(() => Math.random()-0.5);
  return [shuffled[0], shuffled[1]];
}

function showCharSelect() {
  // Simple: just resume. For full impl, show char select overlay.
  // For now reset stacks at new positions and continue.
  g.stacks[0].x = 200; g.stacks[0].y = GROUND_Y;
  g.stacks[1].x = 600; g.stacks[1].y = GROUND_Y;
  g.stacks.forEach(st => {
    st.projectiles = [];
    st.samDeflecting = false;
    st.tommyShielding = false;
    st.biwwyDodging = false;
    st.storedItem = null;
    st.switching = false;
  });
  g.state = 'playing';
}

function showGameOver() {
  const s0 = g.stacks[0].score, s1 = g.stacks[1].score;
  const n0 = g.teamNames[0], n1 = g.teamNames[1];
  const winner = s0 > s1 ? `${n0} WINS!` : s1 > s0 ? `${n1} WINS!` : "IT'S A TIE!";
  const winColor = s0 > s1 ? TEAM_COLORS[0] : s1 > s0 ? TEAM_COLORS[1] : '#fff';
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <div class="overlay-title" style="color:${winColor};font-size:18px;">${winner}</div>
    <div class="overlay-sub">${n0}: ${s0} pts &nbsp;|&nbsp; ${n1}: ${s1} pts</div>
    <button class="big-btn" onclick="location.reload()">PLAY AGAIN</button>
  `;
  ov.style.display = 'flex';
}

// ─── RENDER ──────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,W,H);
  drawStage();
  if (g) {
    drawProjectiles(g.stacks);
    g.stacks.forEach(drawStack);
    drawHUD(g);
  }
}

// ─── MAIN LOOP ───────────────────────────────────────────────────────
let lastTime = null;
function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  readGamepad();
  update(dt);
  render();

  prevKeys = { ...keys };
  prevGamepad = { buttons: { ...gamepadState.buttons } };

  requestAnimationFrame(loop);
}

// ─── UI WIRING ───────────────────────────────────────────────────────
function wireCharSelect(containerId) {
  const container = document.getElementById(containerId);
  container.querySelectorAll('.char-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.char-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
}
wireCharSelect('selectA1');
wireCharSelect('selectA2');
wireCharSelect('selectB1');
wireCharSelect('selectB2');

function getSelected(containerId) {
  const btn = document.querySelector(`#${containerId} .char-btn.selected`);
  return btn ? btn.dataset.char : 'jimmy';
}

document.getElementById('startBtn').addEventListener('click', () => {
  const teamA = [getSelected('selectA1'), getSelected('selectA2')];
  const teamB = [getSelected('selectB1'), getSelected('selectB2')];
  g = createGame(teamA, teamB);

  // First round card pick (random first)
  const first = Math.random() < 0.5 ? 0 : 1;
  g.cardPickQueue = [
    { teamId: first,   slotIdx: 0 },
    { teamId: 1-first, slotIdx: 0 },
  ];
  document.getElementById('overlay').style.display = 'none';
  g.state = 'cardPick';
  startNextCardPick();
});

// ─── PAUSE FUNCTIONS ─────────────────────────────────────────────────
function resumeGame() {
  if (!g) return;
  g.state = 'playing';
  document.getElementById('pauseOverlay').style.display = 'none';
}

function restartGame() {
  document.getElementById('pauseOverlay').style.display = 'none';
  const teamA = [g.stacks[0].chars[0], g.stacks[0].chars[1]];
  const teamB = [g.stacks[1].chars[0], g.stacks[1].chars[1]];
  g = createGame(teamA, teamB);
  const first = Math.random() < 0.5 ? 0 : 1;
  g.cardPickQueue = [{ teamId: first, slotIdx: 0 }, { teamId: 1-first, slotIdx: 0 }];
  g.state = 'cardPick';
  startNextCardPick();
}

function goToMenu() {
  document.getElementById('pauseOverlay').style.display = 'none';
  g = null;
  location.reload();
}

document.getElementById('resumeBtn').addEventListener('click', resumeGame);
document.getElementById('restartBtn').addEventListener('click', restartGame);
document.getElementById('menuBtn').addEventListener('click', goToMenu);

requestAnimationFrame(loop);
</script>
